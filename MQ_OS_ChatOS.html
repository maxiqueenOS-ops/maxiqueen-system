/* ========================= 🎯 RESPUESTA PRINCIPAL ========================= */
function getResponse(message) {
  const text = message.toLowerCase();

  // 1️⃣ CONTEXTO PRIMERO
  const contextual = contextualResponse(text);
  if (contextual) return contextual;

  // 2️⃣ INTENTS NORMALES
  for (const intent of intents) {
    if (intent.keywords.some(k => text.includes(k))) {
      return intent.response();
    }
  }

  // 3️⃣ FALLBACK INTELIGENTE
  return "Te leo 👀 No quiero responderte como bot. Quiero entenderte bien. ¿Me cuentas un poco mejor qué tienes en mente ahora mismo? 👑";
}

/* ========================= 🧩 UI ========================= */
const chatLog = document.getElementById("chatLog");
const input = document.getElementById("userInput");

function appendMessage(text, sender = "bot") {
  const msg = document.createElement("div");
  msg.textContent = text;
  msg.style.whiteSpace = "pre-line";
  msg.className = sender === "user"
    ? "text-right text-amber-400 font-semibold"
    : "text-left text-zinc-200";
  chatLog.appendChild(msg);
  chatLog.scrollTop = chatLog.scrollHeight;
}

function sendMessage() {
  const message = input.value.trim();
  if (!message) return;
  appendMessage(message, "user");
  input.value = "";
  setTimeout(() => {
    appendMessage(getResponse(message), "bot");
  }, 200);
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") sendMessage();
});

/* ========================= 🚀 INIT ========================= */
appendMessage(triggers.onboarding.inicio);

function openLegal(type) {

  const title = document.getElementById("legalTitle");
